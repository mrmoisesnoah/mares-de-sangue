# Painel de edição (Sveltia CMS — compatível com Decap). Edita os .md e faz
# commit no GitHub; o site é reconstruído pelo GitHub Actions automaticamente.
# Docs: https://sveltiacms.app/  ·  Login: ver docs/FASE4-HOSPEDAGEM.md

backend:
  name: github
  repo: mrmoisesnoah/mares-de-sangue
  branch: main
  # Depois de publicar o autenticador (Cloudflare Worker "sveltia-cms-auth"),
  # descomente e preencha com a URL dele:
  # base_url: https://SEU-AUTENTICADOR.workers.dev

# Fluxo: rascunho -> em revisão -> publicado (casa com status do projeto)
publish_mode: editorial_workflow

locale: pt

media_folder: "conteudo/_midia"
public_folder: "/_midia"

collections:
  - name: lore
    label: "Lore do Universo"
    label_singular: "Artigo de lore"
    folder: "conteudo/02 - Lore Original (Textos Historicos)"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "lore" }
      - { label: "Cenário", name: "cenario", widget: "string", default: "Mar de Sangue" }
      - { label: "Status", name: "status", widget: "select", options: ["rascunho", "privado", "publico"], default: "rascunho" }
      - { label: "Audiência", name: "audiencia", widget: "select", options: ["jogadores", "mestre"], default: "jogadores" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Texto", name: "body", widget: "markdown" }

  - name: canone
    label: "Cânone do Mundo"
    folder: "conteudo/01 - Canone Atual"
    create: true
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "canone" }
      - { label: "Status", name: "status", widget: "select", options: ["rascunho", "privado", "publico"], default: "rascunho" }
      - { label: "Audiência", name: "audiencia", widget: "select", options: ["jogadores", "mestre"], default: "jogadores" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Texto", name: "body", widget: "markdown" }

  - name: jornais
    label: "Jornais"
    label_singular: "Edição de jornal"
    folder: "conteudo/05 - Blog Mar de Sangue (recuperado)/5 - Jornal (A Trombeta de Dagor)"
    create: true
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "jornal" }
      - { label: "Jornal / Mesa", name: "campanha", widget: "string", required: false, hint: "Nome do jornal ou da mesa (cada mesa pode ter o seu)" }
      - { label: "Data", name: "data", widget: "date", format: "YYYY-MM-DD", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["rascunho", "privado", "publico"], default: "rascunho" }
      - { label: "Audiência", name: "audiencia", widget: "hidden", default: "jogadores" }
      - { label: "Tags", name: "tags", widget: "list", default: ["Jornal"] }
      - { label: "Texto", name: "body", widget: "markdown" }

  - name: contos
    label: "Contos e Narrativas"
    folder: "conteudo/04 - Contos e Narrativas"
    create: true
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "conto" }
      - { label: "Status", name: "status", widget: "select", options: ["rascunho", "privado", "publico"], default: "rascunho" }
      - { label: "Audiência", name: "audiencia", widget: "select", options: ["jogadores", "mestre"], default: "jogadores" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Texto", name: "body", widget: "markdown" }

  - name: ecos
    label: "Ecos na Cidade dos Corvos (campanha)"
    folder: "conteudo/03 - Mestragem - Ecos na Cidade dos Corvos"
    create: true
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "select", options: ["campanha", "sessao"], default: "sessao" }
      - { label: "Campanha", name: "campanha", widget: "hidden", default: "Ecos na Cidade dos Corvos" }
      - { label: "Data", name: "data", widget: "date", format: "YYYY-MM-DD", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["rascunho", "privado", "publico"], default: "rascunho" }
      - { label: "Audiência", name: "audiencia", widget: "select", options: ["jogadores", "mestre"], default: "mestre" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Texto", name: "body", widget: "markdown" }
