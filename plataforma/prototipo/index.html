<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mares de Sangue — Protótipo da Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --tinta:#2b2117;--tinta2:#5b4a36;--perg:#f3e9d2;--perg2:#ece0c4;--papel:#fbf5e6;
  --sangue:#7c1c14;--ouro:#9a7b3f;--borda:#d8c7a0;--sombra:rgba(60,40,20,.18);
  --mestre:#6b2230;--mesa:#2f5d50;--privado:#7a5c1e;--publico:#3a6ea5;
}
*{box-sizing:border-box}
body{margin:0;background:var(--papel);color:var(--tinta);font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.65}
a{color:var(--sangue);cursor:pointer;text-decoration:none}
.topo{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:10px 18px;
  background:linear-gradient(180deg,#23170f,#3a2616);color:var(--perg);border-bottom:3px solid var(--ouro)}
.marca{font-family:'Cinzel',serif;font-weight:700;font-size:20px;color:var(--perg);cursor:pointer}
.marca small{display:block;font-size:11px;color:#cbb892;font-weight:500;font-style:italic}
.papel-sw{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:#cbb892}
.papel-sw select{font-family:inherit;padding:6px 10px;border-radius:16px;border:1px solid var(--ouro);background:#fffdf6;color:var(--tinta)}
.layout{display:flex;max-width:1180px;margin:0 auto;min-height:calc(100vh - 60px)}
.lateral{flex:0 0 250px;background:var(--perg);border-right:1px solid var(--borda);padding:16px 12px}
.lateral h4{font-family:'Cinzel',serif;font-size:13px;color:var(--ouro);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px}
.lateral a{display:block;padding:6px 10px;border-radius:8px;color:var(--tinta2);font-size:16px}
.lateral a:hover{background:var(--perg2)}
.lateral a.on{background:var(--sangue);color:#fff}
.conteudo{flex:1;min-width:0;padding:24px 32px 60px}
.bread{font-size:13px;color:var(--tinta2);margin-bottom:6px}
h1{font-family:'Cinzel',serif;color:var(--sangue);font-size:30px;margin:.1em 0 .3em}
h2{font-family:'Cinzel',serif;color:var(--tinta);border-bottom:1px solid var(--borda);padding-bottom:5px;margin-top:1.4em;font-size:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:12px}
.card{background:var(--papel);border:1px solid var(--borda);border-radius:10px;padding:14px;box-shadow:0 1px 4px var(--sombra);transition:.15s}
.card.clic{cursor:pointer}
.card.clic:hover{transform:translateY(-2px);border-color:var(--ouro);box-shadow:0 5px 14px var(--sombra)}
.card h3{font-family:'Cinzel',serif;margin:.3em 0 .1em;color:var(--sangue);font-size:17px}
.card .res{color:var(--tinta2);font-size:14px;margin:.2em 0}
.thumb{height:130px;border-radius:8px;background:#e8dcc0 center/cover no-repeat;border:1px solid var(--borda);margin:-2px 0 2px}
.thumb.noimg{display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--ouro);background:var(--perg2)}
.chip{display:inline-block;border-radius:12px;padding:1px 10px;font-size:12px;color:#fff;margin:2px 4px 2px 0}
.c-mestre{background:var(--mestre)}.c-mesa{background:var(--mesa)}.c-privado{background:var(--privado)}
.c-publico{background:var(--publico)}.c-autor_mestre{background:#7a3b1e}
.tipo{display:inline-block;background:var(--perg2);border:1px solid var(--borda);color:var(--tinta2);border-radius:12px;padding:1px 10px;font-size:12px;margin:2px 4px 2px 0}
.btn{display:inline-block;background:var(--sangue);color:#fff;border:0;border-radius:20px;padding:9px 18px;font-family:'Cinzel',serif;font-size:14px;cursor:pointer}
.btn.sec{background:transparent;color:var(--sangue);border:1px solid var(--ouro)}
.lista{list-style:none;padding:0;margin:10px 0}
.lista li{padding:10px 0;border-bottom:1px dotted var(--borda)}
.lista .meta{font-size:12px;color:var(--tinta2)}
.form{background:var(--perg);border:1px solid var(--borda);border-radius:12px;padding:18px;max-width:680px;margin-top:14px}
.form label{display:block;font-family:'Cinzel',serif;font-size:13px;color:var(--tinta2);margin:12px 0 4px}
.form input,.form select,.form textarea{width:100%;padding:9px 11px;border:1px solid var(--ouro);border-radius:8px;font-family:inherit;font-size:15px;background:#fffdf6}
.form textarea{min-height:120px;resize:vertical}
.row{display:flex;gap:12px;flex-wrap:wrap}.row>div{flex:1;min-width:160px}
.aviso{background:#f3d9d4;border:1px solid #d6a99f;color:var(--sangue);padding:10px 14px;border-radius:8px;font-size:14px;margin:10px 0}
.vis-leg{font-size:13px;color:var(--tinta2);margin:8px 0}
.banner{background:var(--perg2);border:1px solid var(--borda);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--tinta2);margin-bottom:16px}
img.capa{max-width:100%;border-radius:8px;border:1px solid var(--borda);margin:10px 0}
.mapa-full{width:100%;border-radius:10px;border:1px solid var(--borda);margin:12px 0}
.empty{color:var(--tinta2);font-style:italic;padding:20px 0}
@media(max-width:820px){.lateral{display:none}.conteudo{padding:18px}}
</style>
</head>
<body>
<header class="topo">
  <div class="marca" onclick="ir('mundo')">Mares de Sangue<small>plataforma · protótipo</small></div>
  <div class="papel-sw">
    Você é:
    <select id="papel" onchange="setPapel(this.value)">
      <option value="visitante">Visitante (sem login)</option>
      <option value="jogador">Jogador — Seraphina</option>
      <option value="mestre" selected>Mestre — Moisés</option>
    </select>
  </div>
</header>
<div class="layout">
  <aside class="lateral" id="nav"></aside>
  <main class="conteudo" id="view"></main>
</div>

<script>
var papel = "mestre";
var EU = {jogador:"Seraphina", mestre:"Moisés"};
var view = {tela:"mundo"};

var IMG = {
  seraphina:"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixsW-Q9chvz_BGi-c9jtqLmjFw_Dk-uR0Cfr5QnFDHbq5Io9D2ylmCa5isnaAB0aGgWYJKvp-6JByO5tZS7j6wd4mXGbCEjEmDZdks30GrLTMmv1ymIqveBY_cspROYc4THLinn7nPNbs/s400/monge.jpg",
  seebo:"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhUAhB71J7degFxY4UyCLq4uxwCgJnPPLyC8lnsRrykqYbcgv9UFofUp2r41DcCfnGRjevgcuZ0Sqk2sMsuzG-mvPk2s6e1NNeq7Lx6HPL9oYm7KqmiUKh4zV6t63k2xu-BXB2wbipkZvU/s400/mage.jpg",
  regiao:"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5f5Dl6quVGV63vwIe7VMbl2WUbEiPg7hOuDWeLaxXcOWgV8aZOLSl1pPHB-B2GKspcLKIFJAdEgMd9klFgbC6y4z_ebuoHnAnUG-WcoQ1BID2CzEHSBztv_IUtseWBGLh7d8vJCyA1IAV/s1600/164922_142243359315119_1885176467_n.jpg",
  cidade:"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhqX5t1QcFjAOchlku3VrH8cgIVKGQct-DTnnRzxfNqNiMEVJGNJtdJySEPp7yPOSTAruUpcSzsaKzMAoQ4vbwdO7_WA6SiQArU_z1BealKO5g5566mXEiBXRrv-ASRAX8bgRLr5ku8k0dv/s1600/cityone_towncenter.jpg"
};

var mundo = {nome:"Mares de Sangue", desc:"O Mundo de Skard — enciclopédia viva do cenário."};
var mesa = {nome:"Ecos na Cidade dos Corvos", desc:"Campanha atual no continente de Dagorcain."};

var personagens = [
  {id:"p1", nome:"Seraphina Altacolina", jogador:"Seraphina", raca:"Halfling bruxa", img:IMG.seraphina,
   bio:"Aprendiz de Válerah Dranor, recrutada anos atrás. Carrega dúvidas sobre o real motivo da viagem a Dranorak."},
  {id:"p2", nome:"Seebo", jogador:"Seebo", raca:"Gnomo mago", img:IMG.seebo,
   bio:"Saiu da Floresta Anã para levar magia de forma pacífica; juntou-se ao Circo Magnífico."}
];

var mapas = [
  {id:"mp1", titulo:"Mapa de Dranor", cat:"região", autor:"Moisés", escopo:"lore", vis:"publico",
   img:IMG.regiao, desc:"O antigo reino do norte, coração do Império Dranoriano."},
  {id:"mp2", titulo:"Cidade de Dranorak", cat:"cidade", autor:"Moisés", escopo:"mesa", vis:"mesa",
   img:IMG.cidade, desc:"A capital — palco da campanha Ecos na Cidade dos Corvos."},
  {id:"mp3", titulo:"Masmorra do Seio de Anar", cat:"masmorra", autor:"Moisés", escopo:"mesa", vis:"mestre",
   img:"", desc:"Mapa de mestre — ainda não revelado aos jogadores. Quando a sessão chegar lá, basta mudar a visibilidade para mesa."}
];

var pubs = [
  {id:1, tipo:"história do mundo", titulo:"O Mundo de Dagorcain", autor:"Moisés", escopo:"lore",
   vis:"publico", estado:"publicado", tags:["Cânone"],
   corpo:"Continente marcado por glórias esquecidas e decadência. No princípio, o domínio sobre Skard travou-se entre deuses e Males Caóticos."},
  {id:2, tipo:"resumo de sessão", titulo:"Sessão 1 — Resumo Narrativo", autor:"Moisés", escopo:"mesa",
   vis:"mesa", estado:"publicado", tags:["Sessão 1"],
   corpo:"A sessão começou na estrada que leva a Dranorak. Válerah viajava com sua aprendiz Seraphina; na mesma estrada seguia o Circo Magnífico, com o gnomo Seebo."},
  {id:3, tipo:"planejamento do mestre", titulo:"Estrutura da Campanha — Arco I", autor:"Moisés", escopo:"mesa",
   vis:"mestre", estado:"rascunho", tags:["Spoiler"],
   corpo:"Arco I — Dranorak. Os PJs descobrem aos poucos a corrupção religiosa do Anarianismo. O Seio de Anar ainda parece legítimo."},
  {id:5, tipo:"diário de personagem", titulo:"Objetivo oculto de Seraphina", autor:"Seraphina", escopo:"mesa",
   vis:"autor_mestre", estado:"publicado", tags:["Segredo"], personagem:"p1",
   corpo:"Combinado só com o mestre: Seraphina busca, em segredo, descobrir o verdadeiro passado de Válerah."},
  {id:6, tipo:"anotação privada", titulo:"Minhas ideias soltas", autor:"Seraphina", escopo:"mesa",
   vis:"privado", estado:"rascunho", tags:[], personagem:"p1",
   corpo:"Rascunho pessoal da jogadora — ninguém mais vê."},
  {id:7, tipo:"cidade", titulo:"Elódia — a Escola de Magia", autor:"Moisés", escopo:"lore",
   vis:"publico", estado:"publicado", tags:["Elódia","Grandes Cidades"],
   corpo:"A mais importante instituição mágica do continente.",
   midia:{tipo:"video", url:"https://www.youtube.com/watch?v=exemplo", legenda:"Trilha ambiente (link externo)"}}
];

function podeVer(p){
  if(p.vis==="publico") return true;
  if(papel==="visitante") return false;
  if(p.autor && p.autor===EU[papel]) return true;
  if(p.vis==="mesa") return papel==="jogador"||papel==="mestre";
  if(p.vis==="autor_mestre") return papel==="mestre";
  if(p.vis==="mestre") return papel==="mestre";
  return false;
}
function visChip(v){return '<span class="chip c-'+v+'">'+v.replace("_","+")+'</span>';}

function setPapel(v){papel=v; render();}
function ir(t,arg){view={tela:t,arg:arg}; window.scrollTo(0,0); render();}

function nav(){
  var mestreLink = (papel==="mestre") ? '<a onclick="ir(\'mestre\')" class="'+(view.tela==="mestre"?"on":"")+'">🔒 Área do Mestre</a>' : '';
  return ''
   +'<h4>Mundo</h4>'
   +'<a onclick="ir(\'mundo\')" class="'+(view.tela==="mundo"?"on":"")+'">Mares de Sangue</a>'
   +'<a onclick="ir(\'lore\')" class="'+(view.tela==="lore"?"on":"")+'">Lore do cenário</a>'
   +'<a onclick="ir(\'mapas\')" class="'+(view.tela==="mapas"||view.tela==="mapa"?"on":"")+'">🗺️ Mapas</a>'
   +'<h4>Mesa: Ecos na Cidade dos Corvos</h4>'
   +(papel==="visitante"
      ? '<a style="color:#a99">— faça login para acessar —</a>'
      : '<a onclick="ir(\'mesa\')" class="'+(view.tela==="mesa"?"on":"")+'">Visão geral</a>'
       +'<a onclick="ir(\'sessoes\')" class="'+(view.tela==="sessoes"?"on":"")+'">Sessões e crônicas</a>'
       +'<a onclick="ir(\'personagens\')" class="'+(view.tela==="personagens"||view.tela==="pers"?"on":"")+'">Personagens</a>'
       +mestreLink);
}

function thumb(img, icone){
  return img ? '<div class="thumb" style="background-image:url('+img+')"></div>'
             : '<div class="thumb noimg">'+(icone||"📜")+'</div>';
}
function elFor(p){
  return '<li><a onclick="ir(\'pub\','+p.id+')"><strong>'+p.titulo+'</strong></a> '
    +'<span class="tipo">'+p.tipo+'</span>'+visChip(p.vis)
    +(p.estado==="rascunho"?'<span class="tipo">rascunho</span>':'')
    +'<div class="meta">por '+p.autor+(p.tags&&p.tags.length?' · '+p.tags.join(", "):'')+'</div></li>';
}

function telaMundo(){
  var lore = pubs.filter(function(p){return p.escopo==="lore"&&podeVer(p);});
  return '<div class="bread">Mundo</div><h1>'+mundo.nome+'</h1><p>'+mundo.desc+'</p>'
   +'<div class="banner">Você está vendo como <strong>'+rotuloPapel()+'</strong>. Troque o papel no topo para ver como a visibilidade muda o que aparece.</div>'
   +'<h2>Mesas neste mundo</h2><div class="cards">'
   +'<div class="card clic" onclick="'+(papel==="visitante"?"":'ir(\'mesa\')')+'">'+thumb(IMG.cidade,"🏰")
     +'<h3>Ecos na Cidade dos Corvos</h3><p class="res">'+mesa.desc+'</p>'
     +(papel==="visitante"?'<p class="meta">Faça login para entrar.</p>':'')+'</div></div>'
   +'<h2>Destaques da lore (público)</h2><ul class="lista">'+lore.map(elFor).join("")+'</ul>';
}
function telaLore(){
  var lore = pubs.filter(function(p){return p.escopo==="lore"&&podeVer(p);});
  return '<div class="bread">Mundo › Lore</div><h1>Lore do cenário</h1>'
   +'<p class="vis-leg">Artigos públicos do mundo — visíveis a todos, inclusive sem login.</p>'
   +'<ul class="lista">'+lore.map(elFor).join("")+'</ul>';
}
function telaMapas(){
  var vis = mapas.filter(podeVer);
  var cards = vis.map(function(m){return '<div class="card clic" onclick="ir(\'mapa\',\''+m.id+'\')">'+thumb(m.img,"🗺️")
    +'<h3>'+m.titulo+'</h3><p class="res">'+m.cat+'</p>'+visChip(m.vis)+'</div>';}).join("");
  return '<div class="bread">Mundo › Mapas</div><h1>🗺️ Mapas</h1>'
   +'<p class="vis-leg">Regiões, cidades e masmorras. Cada mapa tem visibilidade própria — um mapa de masmorra pode ficar só com o mestre até ser revelado.</p>'
   +'<div class="cards">'+(cards||'<div class="empty">Nenhum mapa visível para este papel.</div>')+'</div>';
}
function telaMapa(id){
  var m=mapas.find(function(x){return x.id===id;});
  if(!m||!podeVer(m)) return '<div class="aviso">Você não tem permissão para ver este mapa como '+rotuloPapel()+'.</div>';
  return '<div class="bread">Mundo › Mapas › '+m.titulo+'</div><h1>'+m.titulo+'</h1>'
   +'<p><span class="tipo">mapa · '+m.cat+'</span>'+visChip(m.vis)+'</p>'
   +(m.img?'<img class="mapa-full" src="'+m.img+'" alt="'+m.titulo+'">':'<div class="thumb noimg" style="height:220px">🗺️ (imagem do mapa entra aqui)</div>')
   +'<p>'+m.desc+'</p>';
}
function telaMesa(){
  if(papel==="visitante") return bloqueio();
  var vis = pubs.filter(function(p){return p.escopo==="mesa"&&podeVer(p);});
  return '<div class="bread">Mundo › Ecos na Cidade dos Corvos</div><h1>'+mesa.nome+'</h1><p>'+mesa.desc+'</p>'
   +'<p><a class="btn" onclick="ir(\'nova\')">+ Nova publicação</a> <a class="btn sec" onclick="ir(\'personagens\')">Personagens</a> <a class="btn sec" onclick="ir(\'mapas\')">Mapas</a></p>'
   +'<h2>Publicações que você pode ver</h2><ul class="lista">'+ (vis.length?vis.map(elFor).join(""):'<li class="empty">Nada visível para este papel.</li>') +'</ul>';
}
function telaSessoes(){
  if(papel==="visitante") return bloqueio();
  var s = pubs.filter(function(p){return (p.tipo.indexOf("sessão")>=0||p.tipo.indexOf("crônica")>=0||p.tipo.indexOf("resumo")>=0||p.tipo.indexOf("planejamento")>=0)&&podeVer(p);});
  return '<div class="bread">Mesa › Sessões</div><h1>Sessões e crônicas</h1>'
   +'<p class="vis-leg">Resumos e crônicas ficam visíveis aos jogadores; planejamento do mestre, só ao mestre.</p>'
   +'<ul class="lista">'+s.map(elFor).join("")+'</ul>';
}
function telaPersonagens(){
  if(papel==="visitante") return bloqueio();
  return '<div class="bread">Mesa › Personagens</div><h1>Personagens</h1>'
   +'<div class="cards">'
   + personagens.map(function(c){return '<div class="card clic" onclick="ir(\'pers\',\''+c.id+'\')">'+thumb(c.img,"🧝")
       +'<h3>'+c.nome+'</h3><p class="res">'+c.raca+'</p><p class="meta">jogador: '+c.jogador+'</p></div>';}).join("")
   +'</div>';
}
function telaPers(id){
  var c=personagens.find(function(x){return x.id===id;});
  return '<div class="bread">Mesa › Personagens › '+c.nome+'</div><h1>'+c.nome+'</h1>'
   +'<p class="vis-leg">'+c.raca+' · jogador: '+c.jogador+'</p>'
   +(c.img?'<img class="capa" src="'+c.img+'" alt="" style="max-width:280px">':'')
   +'<h2>História</h2><p>'+c.bio+'</p>'
   +'<h2>Diário e segredos</h2><ul class="lista">'
   + (pubs.filter(function(p){return p.personagem===id;}).filter(podeVer).map(elFor).join("") || '<li class="empty">Nada visível para este papel.</li>')
   +'</ul>';
}
function telaMestre(){
  if(papel!=="mestre") return bloqueio();
  var m = pubs.filter(function(p){return p.vis==="mestre"||p.vis==="autor_mestre";});
  var mp = mapas.filter(function(x){return x.vis==="mestre";});
  return '<div class="bread">Mesa › Área do Mestre</div><h1>🔒 Área do Mestre</h1>'
   +'<p class="vis-leg">Invisível para jogadores. Planejamento, roteiros, segredos, mapas e NPCs não revelados.</p>'
   +'<ul class="lista">'+m.map(elFor).join("")+'</ul>'
   +(mp.length?'<h2>Mapas de mestre</h2><div class="cards">'+mp.map(function(x){return '<div class="card clic" onclick="ir(\'mapa\',\''+x.id+'\')">'+thumb(x.img,"🗺️")+'<h3>'+x.titulo+'</h3><p class="res">'+x.cat+'</p></div>';}).join("")+'</div>':'');
}
function telaPub(id){
  var p=pubs.find(function(x){return x.id===id;});
  if(!p||!podeVer(p)) return '<div class="aviso">Você não tem permissão para ver esta publicação como '+rotuloPapel()+'.</div>';
  var media="";
  if(p.midia){ media = (p.midia.tipo==="video")
     ? '<p class="vis-leg">🎬 Vídeo: <a href="'+p.midia.url+'" target="_blank">'+(p.midia.legenda||p.midia.url)+'</a></p>'
     : '<img class="capa" src="'+p.midia.url+'" alt="">'; }
  return '<div class="bread">Publicação</div><h1>'+p.titulo+'</h1>'
   +'<p><span class="tipo">'+p.tipo+'</span>'+visChip(p.vis)+(p.estado==="rascunho"?'<span class="tipo">rascunho</span>':'')+'</p>'
   +'<p class="meta vis-leg">por '+p.autor+(p.tags&&p.tags.length?' · '+p.tags.join(", "):'')+'</p>'
   +media+'<p>'+p.corpo+'</p>';
}
function telaNova(){
  if(papel==="visitante") return bloqueio();
  var tipos=['conto','background','diário de personagem','mapa','cidade','facção','região','criatura','item','evento histórico','resumo de sessão','crônica','planejamento do mestre','anotação privada'];
  return '<div class="bread">Mesa › Nova publicação</div><h1>Nova publicação</h1>'
   +'<p class="vis-leg">É assim que mestres e jogadores criam conteúdo. (No protótipo, salva só na memória da página.)</p>'
   +'<div class="form">'
   +'<label>Tipo</label><select id="f_tipo">'+tipos.map(function(t){return '<option>'+t+'</option>';}).join("")+'</select>'
   +'<label>Título</label><input id="f_titulo" placeholder="Ex.: A taverna do Corvo Negro">'
   +'<label>Texto</label><textarea id="f_corpo" placeholder="Escreva aqui… aceita [[referências]] a outros textos."></textarea>'
   +'<div class="row"><div><label>Tags (vírgula)</label><input id="f_tags" placeholder="Dranorak, taverna"></div>'
   +'<div><label>Estado</label><select id="f_estado"><option>rascunho</option><option>publicado</option></select></div>'
   +'<div><label>Visibilidade</label><select id="f_vis">'
     +'<option value="mesa">mesa (todos da campanha)</option>'
     +'<option value="publico">público (todos)</option>'
     +'<option value="autor_mestre">autor + mestre</option>'
     +'<option value="privado">privado (só eu)</option>'
     +(papel==="mestre"?'<option value="mestre">só mestre</option>':'')
   +'</select></div></div>'
   +'<label>Mídia — link de imagem/vídeo (opcional)</label><input id="f_midia" placeholder="https://…">'
   +'<p style="margin-top:16px"><button class="btn" onclick="salvarPub()">Publicar</button> '
   +'<button class="btn sec" onclick="ir(\'mesa\')">Cancelar</button></p></div>';
}
function val(id){return document.getElementById(id).value;}
function salvarPub(){
  var t=val("f_titulo").trim()||"(sem título)";
  var midia=val("f_midia").trim();
  var tipo=val("f_tipo");
  var vis=val("f_vis");
  if(tipo==="mapa"){
    var m={id:"mp"+Date.now(),titulo:t,cat:"região",autor:EU[papel]||"Anônimo",escopo:"mesa",vis:vis,img:midia||"",desc:val("f_corpo")||""};
    mapas.unshift(m); ir('mapa',m.id); return;
  }
  var p={id:Date.now(),tipo:tipo,titulo:t,autor:EU[papel]||"Anônimo",escopo:"mesa",vis:vis,
    estado:val("f_estado"),
    tags:val("f_tags").split(",").map(function(s){return s.trim();}).filter(Boolean),
    corpo:val("f_corpo")||"(sem conteúdo)"};
  if(midia) p.midia={tipo:(midia.indexOf("youtu")>=0?"video":"imagem"),url:midia};
  pubs.unshift(p); ir('pub',p.id);
}
function bloqueio(){return '<div class="aviso">Esta área é da campanha. Faça login como jogador ou mestre (troque no topo) para acessar.</div>';}
function rotuloPapel(){return papel==="mestre"?"Mestre":papel==="jogador"?"Jogador (Seraphina)":"Visitante";}

function render(){
  document.getElementById("papel").value=papel;
  document.getElementById("nav").innerHTML=nav();
  var v=view.tela, html="";
  if(v==="mundo")html=telaMundo();
  else if(v==="lore")html=telaLore();
  else if(v==="mapas")html=telaMapas();
  else if(v==="mapa")html=telaMapa(view.arg);
  else if(v==="mesa")html=telaMesa();
  else if(v==="sessoes")html=telaSessoes();
  else if(v==="personagens")html=telaPersonagens();
  else if(v==="pers")html=telaPers(view.arg);
  else if(v==="mestre")html=telaMestre();
  else if(v==="pub")html=telaPub(view.arg);
  else if(v==="nova")html=telaNova();
  document.getElementById("view").innerHTML=html;
}
render();
</script>
</body>
</html>
